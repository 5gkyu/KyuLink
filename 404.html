    <style>
        /* グローバルスタイル */
        :root {
            --bg-color: #FDF2E4;           /* 背景のクリーム色 */
            --text-color: #555c4d;         /* 文字の濃いオリーブグリーン */
            --accent-green: #acc693;        /* ベレー帽のグリーン */
            --hover-green: #92b069;         /* ホバー時の濃いグリーン */
            --accent-peach: #c97a5a;        /* 飾りのピーチカラー (コントラスト確保) */
            --button-text: #ffffff;          /* ボタン内の文字色 */
            --font-family: 'Caveat', 'Yomogi', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        /* コンテナ */
        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 画像スタイル */
        .error-image {
            max-width: 80%; /* スマホ時は少し小さく */
            height: auto;
            border-radius: 20px;
            margin-bottom: 30px;
            object-fit: cover;
            transform: translateX(2%); /* キャラクターの視覚的中心を補正 */
        }

        /* テキストエリア */
        .text-group h1 {
            font-size: 5rem; /* 手書きフォントは少し大きめに */
            color: var(--hover-green);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .text-group h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .text-group p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* ボタンエリア */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px; /* 丸いボタン */
            transition: all 0.3s ease;
            font-size: 1rem;
            border: 2px solid transparent;
        }

        /* メインボタン (グリーン) */
        .btn-primary {
            background-color: var(--accent-green);
            color: var(--button-text);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background-color: var(--hover-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* サブボタン (ピーチの枠線) */
        .btn-secondary {
            border-color: var(--accent-peach);
            color: var(--accent-peach);
            background-color: transparent;
        }

        .btn-secondary:hover {
            background-color: #f5e6de;
            color: var(--accent-peach);
            transform: translateY(-2px);
        }

        /* 落ち葉・花びら Canvas */
        #petals-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* --- レスポンシブ (PC/タブレット) --- */
        @media (min-width: 601px) {
            body {
                overflow: hidden;
            }
            .container {
                max-width: 640px;
            }
            .error-image {
                max-width: 100%;
                max-height: 36vh;
                margin-bottom: 16px;
                transform: translateX(2%);
            }
            .text-group h1 {
                font-size: 3.8rem;
                margin-bottom: 4px;
            }
            .text-group h2 {
                font-size: 1.6rem;
                margin-bottom: 10px;
            }
            .text-group p {
                font-size: 1.1rem;
                margin-bottom: 16px;
                line-height: 1.5;
            }
            .btn {
                padding: 10px 22px;
                font-size: 0.95rem;
            }
        }

        /* 縦幅の狭い画面向けに全体を自動縮小 (1画面に収める) */
        @media (max-height: 700px) {
            body {
                overflow: hidden;
            }
            .error-image {
                max-height: 30vh;
                margin-bottom: 2vh;
            }
            .text-group h1 {
                font-size: clamp(2.5rem, 8vh, 3.8rem);
                margin-bottom: 0;
            }
            .text-group h2 {
                font-size: clamp(1.2rem, 4vh, 1.6rem);
                margin-bottom: 1vh;
            }
            .text-group p {
                font-size: clamp(0.9rem, 3vh, 1.1rem);
                margin-bottom: 3vh;
            }
            .btn {
                padding: 8px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="petals-canvas"></canvas>

    <div class="container">
        <img src="https://5gkyu.github.io/icon/404list.png" alt="申し訳ありません、ページが見つかりません" class="error-image">

        <div class="text-group">
            <h1>404</h1>
            <h2>That page isn't here.</h2>
            <p>
                Oh... I’m so sorry, <br>
                but I can’t seem to find the page you’re looking for.<br>
                Perhaps the link has wandered off, <br>
                or it’s simply no longer here.
            </p>
        </div>

        <div class="button-group">
            <a href="https://5gkyu.github.io/KyuLink/" class="btn btn-primary">Return Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');

        /* 落下物の定義: 葉っぱ2種 + 花びら2種 */
        const SHAPES = [
            { type: 'leaf',  color: '#acc693', size: 10 },
            { type: 'leaf',  color: '#c8dba8', size:  8 },
            { type: 'petal', color: '#edb39b', size:  9 },
            { type: 'petal', color: '#f5cfc0', size:  7 },
        ];

        function rand(min, max) { return Math.random() * (max - min) + min; }

        /* 下部に最初から静止している積もりパーティクル */
        const groundPile = [];
        function initGroundPile() {
            groundPile.length = 0;
            for (let i = 0; i < 60; i++) {
                const s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                groundPile.push({
                    x:       rand(0, canvas.width),
                    y:       canvas.height - rand(2, 38),
                    size:    rand(s.size * 0.8, s.size * 2.0),
                    color:   s.color,
                    type:    s.type,
                    angle:   rand(-Math.PI / 2.2, Math.PI / 2.2),
                    opacity: rand(0.28, 0.65),
                });
            }
        }

        /* キャンバスサイズ設定 */
        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            initGroundPile(); /* リサイズ時に下部の積もりを再配置 */
        }
        window.addEventListener('resize', resize);
        resize();

        /* 落下パーティクル */
        const COUNT = 18;
        const particles = [];

        function createParticle(startAtTop) {
            const s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            return {
                x:     rand(0, canvas.width),
                y:     startAtTop ? rand(-80, -10) : rand(-canvas.height, 0),
                size:  rand(s.size * 0.8, s.size * 1.4),
                color: s.color,
                type:  s.type,
                speed: rand(0.6, 1.6),        /* 落下速度 */
                drift: rand(-0.4, 0.4),       /* 横流れ */
                angle: rand(0, Math.PI * 2),  /* 初期角度 */
                spin:  rand(-0.02, 0.02),     /* 回転速度 */
                sway:  rand(0.3, 0.8),        /* 揺れ幅 */
                swaySpeed: rand(0.01, 0.025), /* 揺れ周期 */
                swayOffset: rand(0, Math.PI * 2),
                opacity: rand(0.55, 0.85),
            };
        }

        for (let i = 0; i < COUNT; i++) {
            particles.push(createParticle(false));
        }

        function drawLeaf(ctx, size) {
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.bezierCurveTo( size * 0.8, -size * 0.5,  size * 0.8,  size * 0.5, 0,  size);
            ctx.bezierCurveTo(-size * 0.8,  size * 0.5, -size * 0.8, -size * 0.5, 0, -size);
            ctx.fill();
            /* 葉脈 */
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.9);
            ctx.lineTo(0,  size * 0.9);
            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        function drawPetal(ctx, size) {
            ctx.beginPath();
            ctx.ellipse(0, -size * 0.5, size * 0.55, size, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            /* 下部の積もり層を先に描画 */
            groundPile.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle   = p.color;
                if (p.type === 'leaf') drawLeaf(ctx, p.size);
                else                   drawPetal(ctx, p.size);
                ctx.restore();
            });

            const now = performance.now() * 0.001;

            particles.forEach(p => {
                /* 位置更新 */
                p.y     += p.speed;
                p.x     += p.drift + Math.sin(now * p.swaySpeed * 60 + p.swayOffset) * p.sway;
                p.angle += p.spin;

                /* 画面外に出たらリセット */
                if (p.y > canvas.height + 20) {
                    Object.assign(p, createParticle(true));
                }

                /* 描画 */
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle   = p.color;

                if (p.type === 'leaf')  drawLeaf(ctx, p.size);
                else                    drawPetal(ctx, p.size);

                ctx.restore();
            });

            requestAnimationFrame(animate);
        }

        animate();
    })();
    </script>
</body>
</html>
